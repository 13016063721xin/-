<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One-Tool 云端大门测试</title>
    <style>
        body {
            /* 同步主页的背景颜色和图片 */
            background-color: #f8fafc;
            background-image: url('https://img-s-msn-com.akamaized.net/tenant/amp/entityid/BB1lVfH3.img?w=1920&h=1080&q=60&m=6&f=jpg&x=345&y=138&u=t');
            background-repeat: no-repeat;
            background-position: right bottom;
            background-size: contain; 
            background-attachment: fixed;
            
            color: #1e293b; /* 字体颜色改为深色 */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            /* 登录框改为半透明白色，带模糊和浅色阴影 */
            background: rgba(255, 255, 255, 0.85);
            padding: 2.5rem;
            border-radius: 1rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            border: 1px solid rgba(0, 0, 0, 0.08);
            backdrop-filter: blur(12px);
            text-align: center;
            width: 350px;
            z-index: 10; /* 保证卡片在背景图片上方 */
        }
        h2 { 
            margin-bottom: 1.5rem; 
            color: #1e293b; /* 标题改为深色 */
            font-weight: 700;
        }
        input {
            width: 100%;
            padding: 0.75rem;
            margin-bottom: 1rem;
            border-radius: 0.5rem;
            border: 1px solid rgba(0,0,0,0.15);
            background: #ffffff; /* 输入框底色改为纯白 */
            color: #1e293b;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus {
            border-color: #0ea5e9; /* 聚焦时边框变蓝 */
        }
        .btn-group { display: flex; gap: 10px; }
        button {
            flex: 1;
            padding: 0.75rem;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s, opacity 0.2s;
        }
        #signUpBtn { background-color: #10b981; color: white; }
        #signInBtn { background-color: #0ea5e9; color: white; }
        button:hover { 
            opacity: 0.9; 
            transform: translateY(-1px);
        }
        #statusMessage { 
            margin-top: 1.5rem; 
            font-size: 0.9rem; 
            min-height: 1.2rem; 
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>One-Tool 控制中心</h2>
        <input type="email" id="email" placeholder="输入邮箱 (例如: test@qq.com)">
        <input type="password" id="password" placeholder="输入密码 (至少6位)">
        
        <div class="btn-group">
            <button id="signUpBtn">注册账号</button>
            <button id="signInBtn">登录</button>
        </div>
        
        <p id="statusMessage"></p>
    </div>

    <script type="module" src="./auth_demo.js"></script>
</body>
</html>
