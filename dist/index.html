<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>个人导航主页</title>
  <style>
    :root {
      --bg: #040712;
      --card: rgba(17, 24, 39, 0.55);
      --text: #f3f6ff;
      --subtle: #b5bfd4;
      --border: rgba(255, 255, 255, 0.14);
      --shadow: 0 6px 20px rgba(0, 0, 0, 0.35);
      --shadow-hover: 0 12px 28px rgba(0, 0, 0, 0.5);
      --radius: 18px;
      --max-width: 900px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC",
        "Helvetica Neue", "Microsoft YaHei", Arial, sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #060b1a 0%, #02040a 100%);
      overflow: hidden;
    }

    #starfield {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .wrap {
      min-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      position: relative;
      z-index: 2;
    }

    .container {
      width: 100%;
      max-width: var(--max-width);
      text-align: center;
    }

    .headline {
      font-size: clamp(32px, 6vw, 60px);
      font-weight: 700;
      letter-spacing: 0.02em;
      margin: 0 0 14px;
      line-height: 1.12;
    }

    .headline-top {
      font-size: clamp(32px, 6vw, 60px);
      font-weight: 700;
      letter-spacing: 0.02em;
      margin: 0 0 8px;
      line-height: 1.12;
    }

    .clock {
      font-size: clamp(48px, 10vw, 96px);
      font-weight: 600;
      letter-spacing: 0.02em;
      margin: 0 0 28px;
      line-height: 1;
    }

    .chat {
      width: 100%;
      max-width: 620px;
      margin: 0 auto;
      text-align: left;
    }

    .chat-panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px;
      backdrop-filter: blur(8px);
    }

    .chat-row {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .chat-input {
      flex: 1;
      border: none;
      background: rgba(255, 255, 255, 0.08);
      outline: none;
      font-size: 14px;
      color: var(--text);
      padding: 10px 12px;
      border-radius: 10px;
    }

    .chat-log {
      height: 230px;
      border-radius: 12px;
      border: 1px solid var(--border);
      padding: 12px;
      font-size: 14px;
      line-height: 1.5;
      background: rgba(0, 0, 0, 0.16);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .chat-msg {
      white-space: pre-wrap;
      word-break: break-word;
    }

    .chat-msg--assistant {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .chat-msg-row {
      display: flex;
      gap: 4px;
      align-items: flex-start;
    }

    .chat-msg-label {
      flex-shrink: 0;
      color: var(--subtle);
    }

    .chat-msg-text {
      flex: 1;
      min-width: 0;
    }

    .chat-msg-actions {
      padding-left: 2.2em;
    }

    .chat-send:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      transform: none;
    }

    .chat-send {
      border: none;
      background: rgba(255, 255, 255, 0.9);
      color: #0a1020;
      padding: 10px 16px;
      border-radius: 12px;
      font-size: 14px;
      cursor: pointer;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    .chat-send:hover {
      transform: translateY(-1px);
      opacity: 1;
    }

    .footer {
      margin-top: 20px;
      font-size: 13px;
      color: var(--subtle);
    }
  </style>
  <script type="module" crossorigin src="/assets/index-F-I0kOrM.js"></script>
</head>
<body>
  <canvas id="starfield" aria-hidden="true"></canvas>
  <div class="wrap">
    <main class="container">
      <h1 class="headline-top">宾明智牛福</h1>
      <h1 class="headline">韦继韬牛逼</h1>
      <h1 id="clock" class="clock">00:00:00</h1>

      <section class="chat" aria-label="AI 对话框">
        <div class="chat-panel">
          <div id="output" class="chat-log" role="log" aria-live="polite"></div>
          <div class="chat-row">
            <input id="user-input" class="chat-input" type="text" placeholder="输入消息，按回车发送..." autocomplete="off" />
            <button id="sendBtn" class="chat-send" type="button">发送</button>
          </div>
        </div>
      </section>

      <div class="footer">Minimal Personal Start Page</div>
    </main>
  </div>

</body>
</html>
