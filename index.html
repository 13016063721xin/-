<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>weijitao</title>
  <style>
    :root {
      --bg: #040712;
      --card: rgba(17, 24, 39, 0.55);
      --text: #f3f6ff;
      --subtle: #b5bfd4;
      --border: rgba(255, 255, 255, 0.14);
      --shadow: 0 6px 20px rgba(0, 0, 0, 0.35);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC",
        "Helvetica Neue", "Microsoft YaHei", Arial, sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #060b1a 0%, #02040a 100%);
      overflow: hidden;
    }

    #starfield {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .wrap {
      min-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 56px 20px 40px;
      position: relative;
      z-index: 2;
    }

    .container {
      width: 100%;
      max-width: min(960px, 96vw);
      text-align: center;
    }

    .clock--fixed {
      position: fixed;
      top: 16px;
      right: 20px;
      z-index: 10;
      margin: 0;
      font-size: clamp(16px, 2.2vw, 22px);
      font-weight: 600;
      letter-spacing: 0.04em;
      line-height: 1.2;
      text-shadow: 0 1px 8px rgba(0, 0, 0, 0.45);
      pointer-events: none;
    }

    .headline {
      font-size: clamp(32px, 6vw, 60px);
      font-weight: 700;
      letter-spacing: 0.02em;
      margin: 0 0 14px;
      line-height: 1.12;
    }

    .headline-top {
      font-size: clamp(32px, 6vw, 60px);
      font-weight: 700;
      letter-spacing: 0.02em;
      margin: 0 0 8px;
      line-height: 1.12;
    }

    .chat {
      width: 100%;
      max-width: min(880px, 94vw);
      margin: 0 auto;
      text-align: left;
    }

    .chat-mode-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .mode-btn {
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.06);
      color: var(--subtle);
      padding: 8px 14px;
      border-radius: 10px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
    }

    .mode-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text);
    }

    .mode-btn--active {
      background: rgba(255, 255, 255, 0.9);
      color: #0a1020;
      border-color: transparent;
    }

    .chat-panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px;
      backdrop-filter: blur(8px);
    }

    .chat-log {
      min-height: 320px;
      height: min(52vh, 520px);
      border-radius: 12px;
      border: 1px solid var(--border);
      padding: 12px;
      font-size: 14px;
      line-height: 1.5;
      background: rgba(0, 0, 0, 0.16);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .chat-row {
      display: flex;
      gap: 10px;
      margin-top: 10px;
      align-items: center;
    }

    .chat-input {
      flex: 1;
      border: none;
      background: rgba(255, 255, 255, 0.08);
      outline: none;
      font-size: 14px;
      color: var(--text);
      padding: 10px 12px;
      border-radius: 10px;
    }

    .chat-msg {
      white-space: pre-wrap;
      word-break: break-word;
    }

    .chat-msg--assistant {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .chat-msg-row {
      display: flex;
      gap: 4px;
      align-items: flex-start;
    }

    .chat-msg-label {
      flex-shrink: 0;
      color: var(--subtle);
    }

    .chat-msg-text {
      flex: 1;
      min-width: 0;
    }

    .chat-msg-text--stack {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .chat-msg-reasoning {
      font-size: 12px;
      line-height: 1.55;
      color: var(--subtle);
      padding: 8px 10px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .chat-msg-reasoning:empty {
      display: none;
    }

    .chat-msg-answer {
      white-space: pre-wrap;
      word-break: break-word;
    }

    .chat-msg-actions {
      padding-left: 2.2em;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .chat-msg-actions--global {
      padding-left: 0;
      margin-top: 10px;
      margin-bottom: 4px;
    }

    .chat-send {
      border: none;
      background: rgba(255, 255, 255, 0.9);
      color: #0a1020;
      padding: 10px 16px;
      border-radius: 12px;
      font-size: 14px;
      cursor: pointer;
      transition: transform 0.2s ease, opacity 0.2s ease;
      white-space: nowrap;
    }

    .chat-send:hover {
      transform: translateY(-1px);
      opacity: 1;
    }

    .chat-send:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      transform: none;
    }

    .chat-icon-btn {
      min-width: 44px;
      padding: 10px 12px;
    }

    .chat-image-msg img {
      max-width: 260px;
      max-height: 260px;
      border-radius: 10px;
      display: block;
      border: 1px solid rgba(255, 255, 255, 0.14);
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.25);
      margin-top: 6px;
    }

    .chat-image-name {
      margin-top: 6px;
      font-size: 12px;
      color: var(--subtle);
    }

    .footer {
      display: none;
    }

    @media print {
      body {
        background: white !important;
        color: black !important;
        overflow: visible !important;
      }

      #starfield,
      #clock,
      .chat-mode-bar,
      .chat-row,
      .headline-top,
      .headline,
      .footer,
      .chat-msg-actions--global {
        display: none !important;
      }

      .wrap {
        padding: 0 !important;
        display: block !important;
      }

      .chat {
        max-width: 100% !important;
      }

      .chat-panel {
        box-shadow: none !important;
        border: none !important;
        background: transparent !important;
        padding: 0 !important;
      }

      .chat-log {
        height: auto !important;
        min-height: auto !important;
        overflow: visible !important;
        border: none !important;
        background: transparent !important;
        color: black !important;
      }

      .chat-msg-reasoning {
        background: #f3f4f6 !important;
        border: 1px solid #e5e7eb !important;
        color: #4b5563 !important;
      }

      .chat-msg-label,
      .chat-msg-text,
      .chat-msg-answer,
      .chat-msg,
      .chat-image-name {
        color: #000 !important;
      }

      .chat-msg-actions {
        display: none !important;
      }
    }
  </style>
</head>
<body>
  <canvas id="starfield" aria-hidden="true"></canvas>
  <div id="clock" class="clock--fixed" aria-live="polite">00:00:00</div>

  <div class="wrap">
    <main class="container">
      <h1 class="headline-top">宾明智牛福</h1>
      <h1 class="headline">韦继韬牛逼</h1>

      <section class="chat" aria-label="AI 对话框">
        <div class="chat-panel">
          <div class="chat-mode-bar" role="tablist" aria-label="对话模式">
            <button type="button" id="modeChat" class="mode-btn mode-btn--active" role="tab" aria-selected="true">聊天</button>
            <button type="button" id="modeDoc" class="mode-btn" role="tab" aria-selected="false">文档</button>
          </div>

          <div id="output" class="chat-log" role="log" aria-live="polite"></div>

          <div class="chat-msg-actions chat-msg-actions--global">
            <button id="exportMixedWordBtn" class="chat-send" type="button" title="导出当前图文对话为 Word">导出整段图文 Word</button>
            <button id="printPdfBtn" class="chat-send" type="button" title="打印/导出当前页面为 PDF">导出整页 PDF</button>
          </div>

          <div class="chat-row">
            <input id="user-input" class="chat-input" type="text" placeholder="输入消息，按回车发送..." autocomplete="off" />
            <input id="imageUploadInput" type="file" accept="image/*" hidden />
            <button id="imageUploadBtn" class="chat-send chat-icon-btn" type="button" title="上传图片">📎</button>
            <button id="sendBtn" class="chat-send" type="button">发送</button>
          </div>
        </div>
      </section>

      <div class="footer">Minimal Personal Start Page</div>
    </main>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
