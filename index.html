<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>个人导航主页</title>
  <style>
    :root {
      --bg: #040712;
      --card: rgba(17, 24, 39, 0.55);
      --text: #f3f6ff;
      --subtle: #b5bfd4;
      --border: rgba(255, 255, 255, 0.14);
      --shadow: 0 6px 20px rgba(0, 0, 0, 0.35);
      --shadow-hover: 0 12px 28px rgba(0, 0, 0, 0.5);
      --radius: 18px;
      --max-width: 900px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC",
        "Helvetica Neue", "Microsoft YaHei", Arial, sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #060b1a 0%, #02040a 100%);
      overflow: hidden;
    }

    #starfield {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .wrap {
      min-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      position: relative;
      z-index: 2;
    }

    .container {
      width: 100%;
      max-width: var(--max-width);
      text-align: center;
    }

    .headline {
      font-size: clamp(32px, 6vw, 60px);
      font-weight: 700;
      letter-spacing: 0.02em;
      margin: 0 0 14px;
      line-height: 1.12;
    }

    .clock {
      font-size: clamp(48px, 10vw, 96px);
      font-weight: 600;
      letter-spacing: 0.02em;
      margin: 0 0 28px;
      line-height: 1;
    }

    .search {
      width: 100%;
      max-width: 620px;
      margin: 0 auto 34px;
    }

    .search form {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 999px;
      box-shadow: var(--shadow);
      padding: 10px;
      backdrop-filter: blur(8px);
    }

    .search input {
      flex: 1;
      border: none;
      background: transparent;
      outline: none;
      font-size: 18px;
      color: var(--text);
      padding: 10px 14px;
    }

    .search input::placeholder {
      color: #9a9aa0;
    }

    .search button {
      border: none;
      background: rgba(255, 255, 255, 0.9);
      color: #0a1020;
      padding: 10px 18px;
      border-radius: 999px;
      font-size: 14px;
      cursor: pointer;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    .search button:hover {
      transform: translateY(-1px);
      opacity: 1;
    }

    .links {
      display: grid;
      grid-template-columns: repeat(2, minmax(140px, 1fr));
      gap: 14px;
      max-width: 620px;
      margin: 0 auto;
    }

    @media (min-width: 700px) {
      .links {
        grid-template-columns: repeat(4, minmax(120px, 1fr));
      }
    }

    .card {
      text-decoration: none;
      color: var(--text);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px 14px;
      font-size: 16px;
      font-weight: 500;
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
      backdrop-filter: blur(8px);
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(0, 0, 0, 0.1);
    }

    .footer {
      margin-top: 20px;
      font-size: 13px;
      color: var(--subtle);
    }
  </style>
</head>
<body>
  <canvas id="starfield" aria-hidden="true"></canvas>
  <div class="wrap">
    <main class="container">
      <h1 class="headline">韦继韬牛逼</h1>
      <h1 id="clock" class="clock">00:00:00</h1>

      <section class="search" aria-label="百度搜索">
        <form action="https://www.baidu.com/s" method="get" target="_blank">
          <input
            type="text"
            name="wd"
            placeholder="搜索你想要的内容..."
            autocomplete="off"
            required
          />
          <button type="submit">搜索</button>
        </form>
      </section>

      <section class="links" aria-label="常用导航">
        <a class="card" href="https://github.com" target="_blank" rel="noopener noreferrer">GitHub</a>
        <a class="card" href="https://vercel.com" target="_blank" rel="noopener noreferrer">Vercel</a>
        <a class="card" href="https://cursor.com" target="_blank" rel="noopener noreferrer">Cursor</a>
        <a class="card" href="https://www.deepseek.com" target="_blank" rel="noopener noreferrer">DeepSeek</a>
      </section>

      <div class="footer">Minimal Personal Start Page</div>
    </main>
  </div>

  <script>
    function initStarfield() {
      const canvas = document.getElementById("starfield");
      const ctx = canvas.getContext("2d");
      let stars = [];
      let width = 0;
      let height = 0;

      function resize() {
        const dpr = window.devicePixelRatio || 1;
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = Math.floor(width * dpr);
        canvas.height = Math.floor(height * dpr);
        canvas.style.width = `${width}px`;
        canvas.style.height = `${height}px`;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        const count = Math.min(220, Math.floor((width * height) / 8000));
        stars = Array.from({ length: count }, () => ({
          x: Math.random() * width,
          y: Math.random() * height,
          r: Math.random() * 1.5 + 0.3,
          a: Math.random() * 0.8 + 0.2,
          twinkle: Math.random() * 0.02 + 0.004,
          drift: Math.random() * 0.08 + 0.02
        }));
      }

      function drawGradient() {
        const g = ctx.createRadialGradient(
          width * 0.5, height * 0.15, 20,
          width * 0.5, height * 0.2, Math.max(width, height) * 0.9
        );
        g.addColorStop(0, "rgba(28, 44, 92, 0.35)");
        g.addColorStop(1, "rgba(2, 4, 10, 0.96)");
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, width, height);
      }

      function animate() {
        drawGradient();
        for (const star of stars) {
          star.a += (Math.random() - 0.5) * star.twinkle;
          if (star.a < 0.15) star.a = 0.15;
          if (star.a > 1) star.a = 1;
          star.y += star.drift;
          if (star.y > height + 2) {
            star.y = -2;
            star.x = Math.random() * width;
          }

          ctx.beginPath();
          ctx.fillStyle = `rgba(255, 255, 255, ${star.a})`;
          ctx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
          ctx.fill();
        }
        requestAnimationFrame(animate);
      }

      resize();
      animate();
      window.addEventListener("resize", resize);
    }

    function updateClock() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2, "0");
      const m = String(now.getMinutes()).padStart(2, "0");
      const s = String(now.getSeconds()).padStart(2, "0");
      document.getElementById("clock").textContent = `${h}:${m}:${s}`;
    }

    initStarfield();
    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
