<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>个人导航主页</title>
  <style>
    :root {
      --bg: #040712;
      --card: rgba(17, 24, 39, 0.55);
      --text: #f3f6ff;
      --subtle: #b5bfd4;
      --border: rgba(255, 255, 255, 0.14);
      --shadow: 0 6px 20px rgba(0, 0, 0, 0.35);
      --shadow-hover: 0 12px 28px rgba(0, 0, 0, 0.5);
      --radius: 18px;
      --max-width: 900px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC",
        "Helvetica Neue", "Microsoft YaHei", Arial, sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #060b1a 0%, #02040a 100%);
      overflow: hidden;
    }

    #starfield {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .wrap {
      min-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      position: relative;
      z-index: 2;
    }

    .container {
      width: 100%;
      max-width: var(--max-width);
      text-align: center;
    }

    .headline {
      font-size: clamp(32px, 6vw, 60px);
      font-weight: 700;
      letter-spacing: 0.02em;
      margin: 0 0 14px;
      line-height: 1.12;
    }

    .headline-top {
      font-size: clamp(32px, 6vw, 60px);
      font-weight: 700;
      letter-spacing: 0.02em;
      margin: 0 0 8px;
      line-height: 1.12;
    }

    .clock {
      font-size: clamp(48px, 10vw, 96px);
      font-weight: 600;
      letter-spacing: 0.02em;
      margin: 0 0 28px;
      line-height: 1;
    }

    .chat {
      width: 100%;
      max-width: 620px;
      margin: 0 auto;
      text-align: left;
    }

    .chat-panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px;
      backdrop-filter: blur(8px);
    }

    .chat-row {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }

    .chat-input {
      width: 100%;
      border: none;
      background: rgba(255, 255, 255, 0.08);
      outline: none;
      font-size: 14px;
      color: var(--text);
      padding: 10px 12px;
      border-radius: 10px;
    }

    .chat-log {
      height: 190px;
      overflow-y: auto;
      border-radius: 12px;
      border: 1px solid var(--border);
      padding: 12px;
      font-size: 14px;
      line-height: 1.5;
      background: rgba(0, 0, 0, 0.16);
      margin-bottom: 10px;
    }

    .chat-line {
      margin: 0 0 8px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .chat-line strong {
      color: #d9e7ff;
    }

    .chat-send {
      border: none;
      background: rgba(255, 255, 255, 0.9);
      color: #0a1020;
      padding: 10px 16px;
      border-radius: 12px;
      font-size: 14px;
      cursor: pointer;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    .chat-send:hover {
      transform: translateY(-1px);
      opacity: 1;
    }

    .footer {
      margin-top: 20px;
      font-size: 13px;
      color: var(--subtle);
    }
  </style>
</head>
<body>
  <canvas id="starfield" aria-hidden="true"></canvas>
  <div class="wrap">
    <main class="container">
      <h1 class="headline-top">宾明智牛福</h1>
      <h1 class="headline">韦继韬牛逼</h1>
      <h1 id="clock" class="clock">00:00:00</h1>

      <section class="chat" aria-label="AI 对话框">
        <div class="chat-panel">
          <div class="chat-row">
            <input id="apiKeyInput" class="chat-input" type="password" placeholder="输入 DeepSeek API Key（sk-...）" autocomplete="off" />
          </div>
          <div id="chatLog" class="chat-log">
            <p class="chat-line"><strong>系统：</strong>你好，这里是简洁 AI 对话框。输入问题后点击发送。</p>
          </div>
          <div class="chat-row">
            <input id="userInput" class="chat-input" type="text" placeholder="请输入你想问的问题..." autocomplete="off" />
            <button id="sendBtn" class="chat-send" type="button">发送</button>
          </div>
        </div>
      </section>

      <div class="footer">Minimal Personal Start Page</div>
    </main>
  </div>

  <script>
    function initStarfield() {
      const canvas = document.getElementById("starfield");
      const ctx = canvas.getContext("2d");
      let stars = [];
      let width = 0;
      let height = 0;

      function resize() {
        const dpr = window.devicePixelRatio || 1;
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = Math.floor(width * dpr);
        canvas.height = Math.floor(height * dpr);
        canvas.style.width = `${width}px`;
        canvas.style.height = `${height}px`;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        const count = Math.min(220, Math.floor((width * height) / 8000));
        stars = Array.from({ length: count }, () => ({
          x: Math.random() * width,
          y: Math.random() * height,
          r: Math.random() * 1.5 + 0.3,
          a: Math.random() * 0.8 + 0.2,
          twinkle: Math.random() * 0.02 + 0.004,
          drift: Math.random() * 0.08 + 0.02
        }));
      }

      function drawGradient() {
        const g = ctx.createRadialGradient(
          width * 0.5, height * 0.15, 20,
          width * 0.5, height * 0.2, Math.max(width, height) * 0.9
        );
        g.addColorStop(0, "rgba(28, 44, 92, 0.35)");
        g.addColorStop(1, "rgba(2, 4, 10, 0.96)");
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, width, height);
      }

      function animate() {
        drawGradient();
        for (const star of stars) {
          star.a += (Math.random() - 0.5) * star.twinkle;
          if (star.a < 0.15) star.a = 0.15;
          if (star.a > 1) star.a = 1;
          star.y += star.drift;
          if (star.y > height + 2) {
            star.y = -2;
            star.x = Math.random() * width;
          }

          ctx.beginPath();
          ctx.fillStyle = `rgba(255, 255, 255, ${star.a})`;
          ctx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
          ctx.fill();
        }
        requestAnimationFrame(animate);
      }

      resize();
      animate();
      window.addEventListener("resize", resize);
    }

    function updateClock() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2, "0");
      const m = String(now.getMinutes()).padStart(2, "0");
      const s = String(now.getSeconds()).padStart(2, "0");
      document.getElementById("clock").textContent = `${h}:${m}:${s}`;
    }

    function initChat() {
      const apiKeyInput = document.getElementById("apiKeyInput");
      const userInput = document.getElementById("userInput");
      const sendBtn = document.getElementById("sendBtn");
      const chatLog = document.getElementById("chatLog");
      const storageKey = "deepseek_api_key";

      apiKeyInput.value = localStorage.getItem(storageKey) || "";
      apiKeyInput.addEventListener("change", () => {
        localStorage.setItem(storageKey, apiKeyInput.value.trim());
      });

      function appendLine(role, text) {
        const line = document.createElement("p");
        line.className = "chat-line";
        line.innerHTML = `<strong>${role}：</strong>${text}`;
        chatLog.appendChild(line);
        chatLog.scrollTop = chatLog.scrollHeight;
      }

      async function sendMessage() {
        const message = userInput.value.trim();
        const apiKey = apiKeyInput.value.trim();
        if (!message) return;
        appendLine("你", message);
        userInput.value = "";

        if (!apiKey) {
          appendLine("系统", "请先填写 DeepSeek API Key。");
          return;
        }

        sendBtn.disabled = true;
        sendBtn.textContent = "发送中...";

        try {
          const res = await fetch("https://api.deepseek.com/chat/completions", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${apiKey}`
            },
            body: JSON.stringify({
              model: "deepseek-chat",
              messages: [
                { role: "system", content: "你是一个简洁的中文助手。" },
                { role: "user", content: message }
              ],
              temperature: 0.7
            })
          });

          if (!res.ok) {
            const errText = await res.text();
            throw new Error(`HTTP ${res.status} ${errText}`);
          }

          const data = await res.json();
          const reply = data?.choices?.[0]?.message?.content || "接口返回为空。";
          appendLine("AI", reply);
        } catch (err) {
          appendLine("系统", `请求失败：${err.message}`);
        } finally {
          sendBtn.disabled = false;
          sendBtn.textContent = "发送";
        }
      }

      sendBtn.addEventListener("click", sendMessage);
      userInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          sendMessage();
        }
      });
    }

    initStarfield();
    initChat();
    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
