<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>图片转 Word - One-Tool</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #f3f4f6;
      color: #1f2937;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      text-align: center;
      width: 100%;
      max-width: 400px;
    }

    .upload-area {
      border: 2px dashed #d1d5db;
      border-radius: 8px;
      padding: 40px 20px;
      margin-bottom: 20px;
      cursor: pointer;
      transition: border-color 0.3s;
    }

    .upload-area:hover {
      border-color: #3b82f6;
    }

    input[type="file"] {
      display: none;
    }

    .btn {
      background-color: #3b82f6;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      width: 100%;
      transition: background-color 0.3s;
    }

    .btn:hover:not(:disabled) {
      background-color: #2563eb;
    }

    .btn:disabled {
      background-color: #9ca3af;
      cursor: not-allowed;
    }

    #status {
      margin-top: 15px;
      font-size: 14px;
      min-height: 20px;
    }

    .loading { color: #d97706; font-weight: bold; }
    .success { color: #10b981; }
    .error { color: #ef4444; }

    #preview {
      max-width: 100%;
      max-height: 200px;
      margin-top: 10px;
      display: none;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>图片转 Word</h2>
    <div class="upload-area" onclick="document.getElementById('file-input').click()">
      <span id="upload-text">点击选择图片上传</span>
      <img id="preview" src="" alt="预览" />
    </div>
    <input type="file" id="file-input" accept="image/png, image/jpeg, image/jpg, image/webp" />
    <button class="btn" id="convert-btn" disabled>转换为 Word 并下载</button>
    <div id="status">请先选择一张图片</div>
  </div>

  <script>
    const fileInput = document.getElementById('file-input');
    const convertBtn = document.getElementById('convert-btn');
    const statusDiv = document.getElementById('status');
    const previewImg = document.getElementById('preview');
    const uploadText = document.getElementById('upload-text');

    let selectedFile = null;

    fileInput.addEventListener('change', (e) => {
      if (e.target.files.length > 0) {
        selectedFile = e.target.files[0];
        uploadText.style.display = 'none';
        previewImg.style.display = 'block';
        previewImg.src = URL.createObjectURL(selectedFile);

        convertBtn.disabled = false;
        statusDiv.textContent = `已选择: ${selectedFile.name}`;
        statusDiv.className = '';
      }
    });

    convertBtn.addEventListener('click', async () => {
      if (!selectedFile) return;

      const formData = new FormData();
      formData.append('file', selectedFile);

      convertBtn.disabled = true;
      convertBtn.textContent = "处理中...";
      statusDiv.innerHTML = '<span class="loading">正在将图片写入 Word，请稍候...</span>';

      try {
        const response = await fetch('http://127.0.0.1:8000/api/img2doc', {
          method: 'POST',
          body: formData
        });

        if (!response.ok) {
          throw new Error(`服务器响应错误 (${response.status})`);
        }

        const blob = await response.blob();
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.style.display = 'none';
        a.href = url;

        const originalName = selectedFile.name.split('.')[0];
        a.download = `${originalName}_排版结果.docx`;

        document.body.appendChild(a);
        a.click();

        window.URL.revokeObjectURL(url);
        document.body.removeChild(a);

        statusDiv.innerHTML = '<span class="success">转换成功！文档已开始下载。</span>';
      } catch (error) {
        console.error('转换失败:', error);
        statusDiv.innerHTML = `<span class="error">转换失败: ${error.message}</span>`;
      } finally {
        convertBtn.disabled = false;
        convertBtn.textContent = "转换为 Word 并下载";
      }
    });
  </script>
</body>
</html>
